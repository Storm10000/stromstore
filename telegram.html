<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STORM SHOP | Steam Powered</title>
    <link href="https://cdnjs.cloudflare.com" rel="stylesheet">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root {
            --black: #050505;
            --white: #ffffff;
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        /* Адаптивный курсор (скрываем на мобилках) */
        @media (min-width: 1024px) {
            * { cursor: none; }
            #cursor { position: fixed; width: 8px; height: 8px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 10000; transition: transform 0.1s; }
            #cursor-follower { position: fixed; width: 30px; height: 30px; border: 1px solid #fff; border-radius: 50%; pointer-events: none; z-index: 9999; transition: transform 0.2s; opacity: 0.3; }
        }

        body { background: var(--black); color: var(--white); font-family: 'Inter', sans-serif; overflow-x: hidden; }

        /* --- PRELOADER --- */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .storm-logo { font-family: 'Syncopate'; font-size: 2rem; letter-spacing: 10px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- HEADER --- */
        header {
            padding: 20px 5%; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border); position: sticky; top: 0; 
            background: rgba(5,5,5,0.9); backdrop-filter: blur(15px); z-index: 900;
        }
        .logo { font-family: 'Syncopate'; font-size: 1rem; letter-spacing: 3px; }

        /* --- GRID --- */
        .main-container { padding: 30px 5%; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); 
            gap: 20px; 
        }

        /* --- АДАПТИВНАЯ КАРТОЧКА --- */
        .game-card { background: #0a0a0a; border: 1px solid var(--border); transition: 0.3s; position: relative; }
        .game-card:hover { border-color: #fff; transform: translateY(-5px); }
        
        .img-wrapper { 
            width: 100%; 
            aspect-ratio: 460/215; /* Пропорция Steam баннера */
            overflow: hidden; 
            background: #111;
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.5s; }
        .game-card:hover img { filter: grayscale(0); }

        .card-info { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .price { font-size: 12px; color: #888; }

        /* --- КОРЗИНА (Адаптивная) --- */
        .side-panel { 
            position: fixed; right: -100%; top: 0; width: 100%; max-width: 400px; 
            height: 100%; background: #000; border-left: 1px solid var(--border); 
            z-index: 2000; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px;
        }
        .side-panel.open { right: 0; }
        .close-panel { margin-bottom: 30px; font-size: 10px; letter-spacing: 2px; cursor: pointer; text-align: right; }

        .cart-item { display: flex; gap: 15px; margin-bottom: 20px; align-items: center; background: #0a0a0a; padding: 10px; }
        .cart-item img { width: 80px; }

        /* --- МОБИЛЬНАЯ АДАПТАЦИЯ --- */
        @media (max-width: 600px) {
            .grid { grid-template-columns: 1fr; } /* Одна колонка на телефонах */
            .logo { font-size: 0.8rem; }
            .storm-logo { font-size: 1.2rem; }
            .side-panel { max-width: 100%; } /* Корзина на весь экран */
        }

        .btn-buy { 
            width: 100%; padding: 15px; background: #fff; color: #000; 
            border: none; font-weight: 900; font-size: 10px; letter-spacing: 2px; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="cursor-follower"></div>

<div id="loader">
    <div class="storm-logo">STORM</div>
    <div id="load-pct" style="margin-top:20px; font-size:10px; letter-spacing:5px;">0%</div>
</div>

<div id="app" style="display:none">
    <header>
        <div class="logo">STORM SHOP</div>
        <div style="display:flex; gap:20px">
            <i class="fas fa-shopping-bag" onclick="toggleCart(true)" style="position:relative">
                <span id="cartBadge" style="position:absolute; top:-8px; right:-10px; font-size:9px; background:#fff; color:#000; padding:2px 5px; border-radius:50%; display:none">0</span>
            </i>
        </div>
    </header>

    <main class="main-container">
        <div class="grid" id="grid"></div>
    </main>

    <div class="side-panel" id="cartPanel">
        <div class="close-panel" onclick="toggleCart(false)">[ ESC / CLOSE ]</div>
        <h2 style="font-family:'Syncopate'; margin-bottom:30px; font-size:14px;">YOUR BAG</h2>
        <div id="cartItems"></div>
        <div style="margin-top:40px;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; font-size:12px;">
                <span>TOTAL:</span>
                <span id="totalPrice">0 ₽</span>
            </div>
            <button class="btn-buy">CHECKOUT</button>
        </div>
    </div>
</div>

<script>
    // Массив игр с AppID из Steam
    const games = [
        { id: 730, title: 'CS 2', price: 0 },
        { id: 570, title: 'Dota 2', price: 0 },
        { id: 1091500, title: 'Cyberpunk 2077', price: 2900 },
        { id: 1493710, title: 'Alan Wake 2', price: 3500 },
        { id: 1245620, title: 'Elden Ring', price: 3999 },
        { id: 1174180, title: 'RDR 2', price: 2499 },
        { id: 1817070, title: 'Spider-Man', price: 3100 },
        { id: 1086940, title: 'Baldur\'s Gate 3', price: 1999 }
    ];

    let cart = [];

    // Подгрузка картинок Steam (header.jpg - стандартный баннер)
    function getSteamImg(appId) {
        return `https://cdn.akamai.steamstatic.com{appId}/header.jpg`;
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = games.map(g => `
            <div class="game-card" onclick="addToCart(${g.id})">
                <div class="img-wrapper">
                    <img src="${getSteamImg(g.id)}" alt="${g.title}" onerror="this.src='https://via.placeholder.com'">
                </div>
                <div class="card-info">
                    <div class="title">${g.title}</div>
                    <div class="price">${g.price > 0 ? g.price + ' ₽' : 'FREE'}</div>
                </div>
            </div>
        `).join('');
    }

    function addToCart(id) {
        const game = games.find(g => g.id === id);
        cart.push({...game, cartId: Date.now()});
        updateUI();
        toggleCart(true);
    }

    function updateUI() {
        const list = document.getElementById('cartItems');
        list.innerHTML = cart.map(i => `
            <div class="cart-item">
                <img src="${getSteamImg(i.id)}">
                <div style="flex:1; font-size:10px;"><b>${i.title}</b></div>
                <i class="fas fa-trash" style="font-size:10px; color:#444" onclick="removeFromCart(${i.cartId})"></i>
            </div>
        `).join('');
        document.getElementById('totalPrice').innerText = cart.reduce((s,i) => s + i.price, 0) + ' ₽';
        const badge = document.getElementById('cartBadge');
        badge.innerText = cart.length;
        badge.style.display = cart.length > 0 ? 'block' : 'none';
    }

    function removeFromCart(cid) {
        cart = cart.filter(i => i.cartId !== cid);
        updateUI();
    }

    function toggleCart(show) { document.getElementById('cartPanel').classList.toggle('open', show); }

    // Loader & Initialization
    let p = 0;
    const inv = setInterval(() => {
        p += 5;
        document.getElementById('load-pct').innerText = p + '%';
        if(p >= 100) {
            clearInterval(inv);
            document.getElementById('loader').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            render();
        }
    }, 50);

    // Mouse Tracking (для ПК)
    document.addEventListener('mousemove', e => {
        const c = document.getElementById('cursor');
        const f = document.getElementById('cursor-follower');
        if(c) {
            c.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            f.style.transform = `translate(${e.clientX - 11}px, ${e.clientY - 11}px)`;
        }
    });
</script>

</body>
</html>
